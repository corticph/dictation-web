name: release-notes

on:
  workflow_call:
    outputs:
      ts:
        description: "Slack message timestamp (for threading follow-up messages)"
        value: ${{ jobs.release-notes.outputs.ts }}

jobs:
  release-notes:
    name: Prepare release notes
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.post_to_slack.outputs.ts }}
    permissions:
      contents: write
      pull-requests: read

    env:
      RELEASE_WHAT: Dictation Web
      RELEASE_WHERE: npm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get merged PRs since last release
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            const { default: getMergedPRs } = await import("${{ github.workspace }}/.github/scripts/get-merged-prs.js");
            return await getMergedPRs({ github, context, releaseOnly: ${{ !github.event.release.prerelease }} });

      - name: Fetch PR details and Linear issues
        id: pr_details
        uses: actions/github-script@v7
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          script: |
            const fs = await import("node:fs");
            const { prs } = JSON.parse(`${{ steps.prs.outputs.result }}`);

            const { default: fetchPRDetails } = await import("${{ github.workspace }}/.github/scripts/fetch-pr-details.js");
            const { default: fetchLinearIssues } = await import("${{ github.workspace }}/.github/scripts/fetch-linear-issues.js");

            const { pullRequests, issueIds } = await fetchPRDetails({ github, context }, prs);
            const issues = await fetchLinearIssues(issueIds);

            fs.writeFileSync("pr-details.json", JSON.stringify({ pullRequests, issues }));

      - name: Prepare release notes and Slack message
        id: notes
        uses: actions/github-script@v7
        env:
          RELEASE_WHAT: ${{ env.RELEASE_WHAT }}
          RELEASE_WHERE: ${{ env.RELEASE_WHERE }}
        with:
          script: |
            const fs = await import("node:fs");
            const { default: prepareReleaseNotes } = await import("${{ github.workspace }}/.github/scripts/prepare-release-notes.js");
            const { default: prepareSlackMessage } = await import("${{ github.workspace }}/.github/scripts/prepare-slack-message.js");

            const isRelease = !context.payload.release.prerelease;
            const details = JSON.parse(fs.readFileSync("pr-details.json", "utf8"));

            const releaseNotes = await prepareReleaseNotes(details);
            const slackMessage = await prepareSlackMessage({ context }, details, isRelease);

            fs.writeFileSync("release-notes.md", releaseNotes);
            fs.writeFileSync("slack-message.md", slackMessage);

            fs.writeFileSync(
              "slack-payload.json",
              JSON.stringify({
                markdown_text: slackMessage,
                unfurl_links: false,
                unfurl_media: false,
              }),
            );
          result-encoding: json

      - name: Determine Slack channel
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "false" ]]; then
            echo "CHANNEL_ID=${{ vars.SLACK_RELEASE_CHANNEL_ID }}" >> $GITHUB_ENV
          else
            echo "CHANNEL_ID=${{ vars.SLACK_PRERELEASE_CHANNEL_ID }}" >> $GITHUB_ENV
          fi

      - name: Post to Slack
        id: post_to_slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ env.CHANNEL_ID }}
          payload-file-path: ./slack-payload.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Upload pr-details as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-details
          path: pr-details.json

      - name: Attach notes to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-notes.md
