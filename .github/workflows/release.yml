name: release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract version and determine target branch
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"   # e.g. "alpha.1" from "1.2.3-alpha.1"
            SUFFIX="${PRERELEASE%%.*}"   # strip ".1" → "alpha" (npm dist-tag)
          else
            SUFFIX=""
          fi
          TARGET="${{ github.event.release.target_commitish }}"
          if [[ "$TARGET" == "main" || "$TARGET" == "master" ]]; then
            BRANCH="release/${TAG}"
          else
            BRANCH="$TARGET"
          fi
          echo "tag=$TAG"
          echo "version=$VERSION"
          echo "prerelease=${{ github.event.release.prerelease }}"
          echo "suffix=$SUFFIX"
          echo "target_commitish=$TARGET"
          echo "branch=$BRANCH"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Prepare working branch
        # Always create a local branch from the current detached HEAD so git push works.
        # For main/master this creates a new release/vX.Y.Z branch.
        # For other branches this gives the detached HEAD a pushable name.
        run: |
          git checkout -b "${{ steps.version.outputs.branch }}"
          git pull --rebase origin "${{ steps.version.outputs.branch }}" || true

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Bump version and push
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.version }}"
          if [[ "$CURRENT" == "$TARGET" ]]; then
            echo "Version already $TARGET — skipping version bump"
          else
            echo "Bumping version: $CURRENT → $TARGET"
            npm version "$TARGET" --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m "chore: bump version to $TARGET"
            git push origin "${{ steps.version.outputs.branch }}"
          fi

      - name: Build
        run: npm run build && npm run build:bundle

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken ${NPM_TOKEN}
          SUFFIX="${{ steps.version.outputs.suffix }}"
          if [[ -n "$SUFFIX" ]]; then
            npx -y npm@latest publish --access public --tag "$SUFFIX"
          else
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            CURRENT_LATEST=$(npm view "${PKG_NAME}" dist-tags.latest 2>/dev/null || echo "0.0.0")
            if npx -y semver "${PKG_VERSION}" -r "<${CURRENT_LATEST}" > /dev/null 2>&1; then
              echo "Publishing ${PKG_VERSION} with --tag backport (current latest is ${CURRENT_LATEST})"
              npx -y npm@latest publish --access public --tag backport
            else
              npx -y npm@latest publish --access public
            fi
          fi
